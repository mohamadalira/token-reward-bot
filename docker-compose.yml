services:
  postgres:
    image: postgres:16-alpine
    container_name: tokenbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tokenbot}
      POSTGRES_USER: ${POSTGRES_USER:-tokenbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokenbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tokenbot_network

  redis:
    image: redis:7-alpine
    container_name: tokenbot_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tokenbot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokenbot_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - config_uploads:/app/uploads
    expose:
      - "8000"
    networks:
      - tokenbot_network

  mini-app:
    profiles: ["miniapp"]
    build:
      context: ./mini-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${WEBAPP_URL}/api
    container_name: tokenbot_miniapp
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${WEBAPP_URL}/api
    expose:
      - "3000"
    networks:
      - tokenbot_network

  nginx:
    image: nginx:alpine
    container_name: tokenbot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - tokenbot_network

  certbot:
    image: certbot/certbot
    container_name: tokenbot_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  config_uploads:
  certbot_conf:
  certbot_www:

networks:
  tokenbot_network:
    driver: bridge
